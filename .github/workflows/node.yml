name: REST_DEV_PROJECT_CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    env:
      CI: true
    strategy:
      matrix:
        node-version: [22.x, 16.x]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repoo
        uses: actions/checkout@v4
      - name: Use Node.js version ${{matrix.node-version}}
        uses: actions/setup-node@v4
        with: 
          node-version: ${{matrix.node-veersion}}
      - name: Install Depndencies
        run: npm install
      - name: Build Client
        run: npm run build --prefix client
