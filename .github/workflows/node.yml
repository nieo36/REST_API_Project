name: REST_DEV_PROJECT_CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repoo
        uses: actions/checkout@v4
      - name: Use Node.js version 22
        uses: actions/setup-node@v4
        with: 
          node-version: '22'
      - name: Install Depndencies
        run: npm install
      - name: Build Client
        run: npm run build --prefix client
